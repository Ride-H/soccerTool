name: CI & Deploy

# ブランチモデル:
#   main       … PR 経由のみ（保護）。CI 合格 + レビュー承認で結合 → Pages へ自動デプロイ
#   dev        … 直接 push 可。push で即 CI。失敗時は自動で Issue フラグを立てる
#   feature/*  … dev から機能単位で分岐。CI 合格後 dev へ PR
# 公開物は常にテスト通過済み（テストが落ちればデプロイされない）。

on:
  push:
    branches: [main, dev, "feature/**"]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"   # #153: 視覚スモークが Node 組込み WebSocket（22+）を使う
      - name: Run tests (node --test)
        run: node --test rpdx/test/*.test.mjs
      - name: Build single-file HTML
        run: node rpdx/build.mjs
      # #153: 視覚回帰ゲート — CDP 生プロトコル + ランナー同梱 Chrome（依存追加なし）
      - name: Visual regression smoke (#153)
        run: node rpdx/test/visual/smoke.mjs
      - name: Upload visual smoke output (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-smoke-out
          path: rpdx/test/visual/out
          if-no-files-found: ignore
      # Pages 用サイトの組み立ては main への push（= PR 結合）時のみ
      - name: Assemble Pages site (index.html + dist)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf _site && mkdir -p _site
          cp -R dist _site/dist
          cp index.html _site/index.html
          touch _site/.nojekyll
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # dev への push で CI が落ちたら自動でフラグ（Issue）を立てる
  flag-dev-failure:
    name: Flag dev failure
    needs: test-build
    if: always() && failure() && github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Open / update failure flag issue
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="CI failing on dev"
          body="dev の CI が失敗しています。\n\n- コミット: ${SHA}\n- 実行ログ: ${RUN_URL}\n\nこのフラグは dev の CI が再び通れば手動でクローズしてください。"
          existing=$(gh issue list --repo "${{ github.repository }}" --state open --label ci-failure --search "in:title $title" --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "$(printf '%b' "$body")"
          else
            gh label create ci-failure --repo "${{ github.repository }}" --color B60205 --description "CI failing flag" 2>/dev/null || true
            gh issue create --repo "${{ github.repository }}" --title "$title" --label ci-failure --body "$(printf '%b' "$body")"
          fi

  deploy:
    name: Deploy to GitHub Pages
    needs: test-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
