name: CI & Deploy

# push/PR で 54 テストを実行し、main への push 時のみ再ビルドして GitHub Pages へ自動デプロイ。
# テストが落ちるとデプロイされない（＝公開物は常にテスト通過済み）。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-build:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run tests (node --test)
        run: node --test rpdx/test/*.test.mjs
      - name: Build single-file HTML
        run: node rpdx/build.mjs
      - name: Assemble Pages site (index.html + dist)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf _site && mkdir -p _site
          cp -R dist _site/dist
          cp index.html _site/index.html
          touch _site/.nojekyll
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: test-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
